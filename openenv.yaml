name: core/hr-compliance
version: 1.0.0
description: Triage HR compliance reports and handle investigations, routing, and safety alerts.
tasks:
  - id: 1
    name: "Easy: IT Ticket Routing"
    difficulty: easy
    description: "Identify any incoming messages meant for IT Support (e.g. broken monitors, passwords) and move them to the 'IT_Support' folder."
  - id: 2
    name: "Medium: Workplace Safety Violations"
    difficulty: medium
    description: "Identify reports of genuine physical hazards (e.g. spills, unstable structures). Tag them with 'safety_hazard' and reply."
  - id: 3
    name: "Hard: Whistleblower Escalation"
    difficulty: hard
    description: "Detect severe complaints of embezzlement or misconduct. Move the report to the 'Confidential' folder and tag it 'investigation_required'. Be careful not to escalate standard office gossip."
